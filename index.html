<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Planner — Projects A, B & C</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0C1929;
    --surface:   #152036;
    --surface2:  #1C2B44;
    --border:    #243557;
    --text:      #C7D6F0;
    --text-dim:  #5E7BA0;
    --text-head: #E8EEF8;

    --proj-a:    #0052CC;
    --proj-a2:   #4C9AFF;
    --proj-b:    #6554C0;
    --proj-b2:   #998DD9;
    --proj-c:    #00875A;
    --proj-c2:   #57D9A3;

    --milestone: #FF991F;
    --today:     #FF5630;

    --blue:      #0065FF;
    --teal:      #00B8D9;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
  }
  .logo {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; font-size: 15px; color: var(--text-head);
  }
  .logo svg { width: 28px; height: 28px; }
  header h1 { font-size: 14px; font-weight: 500; color: var(--text-dim); }
  .header-sep { color: var(--border); }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .view-tabs { display: flex; gap: 2px; background: var(--bg); border-radius: 6px; padding: 3px; }
  .tab {
    padding: 6px 16px; border-radius: 4px; border: none; background: transparent;
    color: var(--text-dim); font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all .15s; font-family: 'Inter', sans-serif;
  }
  .tab.active { background: var(--surface); color: var(--text-head); }
  .tab:hover:not(.active) { color: var(--text); }

  .sep { width: 1px; height: 24px; background: var(--border); margin: 0 6px; }

  .legend { display: flex; align-items: center; gap: 16px; margin-left: auto; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* ── MAIN ── */
  main { padding: 24px; }

  /* ═══════════════════════════ CALENDAR VIEW ═══════════════════════════ */
  #view-calendar { display: none; }
  #view-calendar.active { display: block; }

  .cal-nav {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  .cal-nav h2 { font-size: 20px; font-weight: 600; color: var(--text-head); }
  .nav-btn {
    width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: background .15s;
  }
  .nav-btn:hover { background: var(--border); }

  .cal-grid { background: var(--surface); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .cal-weekday {
    padding: 10px 8px; text-align: center; font-size: 11px; font-weight: 600;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em;
  }
  .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-day {
    min-height: 100px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    padding: 8px; position: relative;
  }
  .cal-day:nth-child(7n) { border-right: none; }
  .cal-day.other-month { opacity: .35; }
  .cal-day.today .day-num { background: var(--today); color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .day-num { font-size: 12px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; display: inline-block; min-width: 24px; text-align: center; }
  .sprint-pill {
    font-size: 10px; font-weight: 600; border-radius: 3px; padding: 2px 6px;
    margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%; display: block; letter-spacing: .02em;
  }
  .pill-a { background: rgba(0,82,204,.35); color: var(--proj-a2); border-left: 2px solid var(--proj-a); }
  .pill-b { background: rgba(101,84,192,.35); color: var(--proj-b2); border-left: 2px solid var(--proj-b); }
  .pill-c { background: rgba(0,135,90,.35); color: var(--proj-c2); border-left: 2px solid var(--proj-c); }

  /* ═══════════════════════════ GANTT VIEW ═══════════════════════════ */
  #view-gantt { display: none; }
  #view-gantt.active { display: block; }

  .gantt-wrap {
    background: var(--surface); border-radius: 10px; border: 1px solid var(--border);
    overflow: auto;
  }
  .gantt-inner { min-width: 900px; }

  .gantt-header-row {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--surface2); position: sticky; top: 0; z-index: 10;
  }
  .gantt-label-col { width: 200px; min-width: 200px; padding: 10px 16px; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; border-right: 1px solid var(--border); }
  .gantt-months { flex: 1; display: flex; }
  .gantt-month { flex: 1; text-align: center; padding: 10px 4px; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; border-right: 1px solid var(--border); }
  .gantt-month:last-child { border-right: none; }

  .gantt-subheader {
    display: flex; border-bottom: 2px solid var(--border);
    background: var(--surface2);
  }
  .gantt-sub-label { width: 200px; min-width: 200px; border-right: 1px solid var(--border); }
  .gantt-days-row { flex: 1; display: flex; position: relative; }
  .gantt-day-tick {
    flex: 1; text-align: center; padding: 4px 0; font-size: 9px; color: var(--text-dim);
    border-right: 1px solid rgba(36,53,87,.4);
  }
  .gantt-day-tick.weekend { background: rgba(0,0,0,.1); }
  .gantt-day-tick.today-tick { background: rgba(255,86,48,.12); color: var(--today); font-weight: 700; }

  .gantt-section-head {
    display: flex; align-items: center;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 8px 16px;
  }
  .gantt-section-head span { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
  .proj-tag {
    font-size: 10px; font-weight: 700; border-radius: 3px; padding: 2px 7px; margin-right: 10px;
  }
  .tag-a { background: rgba(0,82,204,.25); color: var(--proj-a2); }
  .tag-b { background: rgba(101,84,192,.25); color: var(--proj-b2); }
  .tag-c { background: rgba(0,135,90,.25); color: var(--proj-c2); }

  .gantt-row {
    display: flex; align-items: center; border-bottom: 1px solid var(--border); min-height: 48px;
  }
  .gantt-row:hover { background: rgba(255,255,255,.02); }
  .gantt-row-label {
    width: 200px; min-width: 200px; padding: 0 16px; border-right: 1px solid var(--border);
  }
  .row-name { font-size: 13px; font-weight: 500; color: var(--text-head); }
  .row-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .gantt-bar-area { flex: 1; position: relative; height: 48px; }
  .gantt-grid-line {
    position: absolute; top: 0; bottom: 0; width: 1px;
    background: rgba(36,53,87,.5); pointer-events: none;
  }
  .gantt-grid-line.today-line { background: var(--today); opacity: .6; width: 2px; }

  .gantt-bar {
    position: absolute; top: 50%; transform: translateY(-50%);
    height: 28px; border-radius: 6px; display: flex; align-items: center;
    padding: 0 10px; font-size: 11px; font-weight: 600; color: #fff;
    overflow: hidden; white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
    cursor: default;
  }
  .gantt-bar::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,.12), rgba(255,255,255,0));
    pointer-events: none; border-radius: 6px;
  }
  .bar-a { background: linear-gradient(90deg, var(--proj-a), #2684FF); }
  .bar-b { background: linear-gradient(90deg, var(--proj-b), #8777D9); }
  .bar-c { background: linear-gradient(90deg, var(--proj-c), #36B37E); }

  .bar-start-dot, .bar-end-dot {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 10px; height: 10px; border-radius: 50%; border: 2px solid rgba(255,255,255,.7);
    background: #fff;
  }
  .bar-start-dot { left: -14px; }
  .bar-end-dot { right: -14px; }

  .milestone-marker {
    position: absolute; top: 50%; transform: translateY(-50%) rotate(45deg);
    width: 14px; height: 14px; background: var(--milestone);
    box-shadow: 0 2px 6px rgba(255,153,31,.5);
  }

  /* milestone label */
  .milestone-label {
    position: absolute; top: 4px; font-size: 9px; font-weight: 700;
    color: var(--milestone); white-space: nowrap; letter-spacing: .04em;
    text-shadow: 0 1px 4px rgba(0,0,0,.6);
  }

  /* ═══════════════════════════ TABLE VIEW ═══════════════════════════ */
  #view-table { display: none; }
  #view-table.active { display: block; }

  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .15s; font-family: 'Inter', sans-serif;
  }
  .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .filter-btn:hover:not(.active) { border-color: var(--text-dim); color: var(--text); }

  .table-wrap { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); border-bottom: 2px solid var(--border); }
  th {
    padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em;
    white-space: nowrap;
  }
  th:first-child { border-radius: 0; }
  td { padding: 13px 16px; font-size: 13px; color: var(--text); vertical-align: middle; }
  tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
  tbody tr:hover td { background: rgba(255,255,255,.02); }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    letter-spacing: .03em;
  }
  .status-active { background: rgba(0,135,90,.2); color: #57D9A3; }
  .status-completed { background: rgba(36,53,87,.5); color: var(--text-dim); }
  .status-planned { background: rgba(0,101,255,.15); color: #4C9AFF; }

  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .ms-badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 3px 9px; border-radius: 4px; border: 1px solid;
    letter-spacing: .04em;
  }
  .ms-int  { background: rgba(101,84,192,.15); color: var(--proj-b2); border-color: var(--proj-b); }
  .ms-uat  { background: rgba(255,153,31,.1);  color: #FFB84D; border-color: var(--milestone); }
  .ms-dev  { background: rgba(0,82,204,.15);   color: var(--proj-a2); border-color: var(--proj-a); }
  .ms-stg  { background: rgba(0,135,90,.15);   color: var(--proj-c2); border-color: var(--proj-c); }
  .ms-prd  { background: rgba(255,86,48,.1);   color: #FF8B73; border-color: var(--today); }
  .ms-qa   { background: rgba(0,184,217,.1);   color: #60D4EA; border-color: var(--teal); }
  .ms-rel  { background: rgba(101,84,192,.25); color: #C5B5FF; border-color: #8777D9; }

  .proj-label { font-weight: 600; }
  .proj-a-color { color: var(--proj-a2); }
  .proj-b-color { color: var(--proj-b2); }
  .proj-c-color { color: var(--proj-c2); }

  /* sprint name monospace */
  .sprint-name { font-family: 'Courier New', monospace; font-size: 12px; color: var(--text-head); }

  /* date cell */
  .date-cell { font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ── TOOLTIP ── */
  .tooltip-wrap { position: relative; }
  .tooltip {
    display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #1E2D45; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font-size: 11px; color: var(--text); white-space: nowrap;
    z-index: 100; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,.4);
    min-width: 160px;
  }
  .tooltip strong { display: block; color: var(--text-head); margin-bottom: 4px; font-size: 12px; }
  .tooltip-wrap:hover .tooltip { display: block; }

  /* summary cards */
  .summary-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px;
    margin-bottom: 20px;
  }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px;
  }
  .summary-card .sc-label { font-size: 11px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: .07em; }
  .summary-card .sc-val { font-size: 26px; font-weight: 700; color: var(--text-head); margin-top: 4px; }
  .summary-card .sc-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="6" fill="#0052CC"/>
      <path d="M16 5L6 17.5H13.5V27L23 14.5H15.5V5H16Z" fill="white"/>
    </svg>
    Sprint Planner
  </div>
  <span class="header-sep">/</span>
  <h1>Projects A · B · C — Sprint Timeline</h1>
</header>

<div class="toolbar">
  <div class="view-tabs">
    <button class="tab active" onclick="switchView('calendar')">📅 Calendar</button>
    <button class="tab" onclick="switchView('gantt')">📊 Gantt</button>
    <button class="tab" onclick="switchView('table')">📋 Table</button>
  </div>
  <div class="sep"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--proj-a)"></div>Project A</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--proj-b)"></div>Project B</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--proj-c)"></div>Project C</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--milestone)"></div>Milestone</div>
  </div>
</div>

<main>

  <!-- ════ CALENDAR VIEW ════ -->
  <div id="view-calendar" class="active">
    <div class="cal-nav">
      <button class="nav-btn" onclick="calNav(-1)">‹</button>
      <h2 id="cal-title"></h2>
      <button class="nav-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-weekday">Sun</div><div class="cal-weekday">Mon</div>
        <div class="cal-weekday">Tue</div><div class="cal-weekday">Wed</div>
        <div class="cal-weekday">Thu</div><div class="cal-weekday">Fri</div>
        <div class="cal-weekday">Sat</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
  </div>

  <!-- ════ GANTT VIEW ════ -->
  <div id="view-gantt">
    <div class="summary-row" id="gantt-summary"></div>
    <div class="gantt-wrap">
      <div class="gantt-inner" id="gantt-inner"></div>
    </div>
  </div>

  <!-- ════ TABLE VIEW ════ -->
  <div id="view-table">
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" onclick="filterTable('all', this)">All Sprints</button>
      <button class="filter-btn" onclick="filterTable('active', this)">🟢 Active</button>
      <button class="filter-btn" onclick="filterTable('planned', this)">🔵 Planned</button>
      <button class="filter-btn" onclick="filterTable('completed', this)">⚫ Completed</button>
      <button class="filter-btn" onclick="filterTable('A', this)">Project A</button>
      <button class="filter-btn" onclick="filterTable('B', this)">Project B</button>
      <button class="filter-btn" onclick="filterTable('C', this)">Project C</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Project</th>
            <th>Sprint Name</th>
            <th>Status</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Duration</th>
            <th>Milestone</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

</main>

<script>
// ══════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════

function d(y,m,day){ return new Date(y,m-1,day); }

// Milestones (global, placed on specific dates)
const milestones = [
  { name:'DEV',   date: d(2025,6,13), color:'ms-dev'  },
  { name:'INT',   date: d(2025,7,4),  color:'ms-int'  },
  { name:'QA',    date: d(2025,7,25), color:'ms-qa'   },
  { name:'UAT',   date: d(2025,8,15), color:'ms-uat'  },
  { name:'STG',   date: d(2025,9,5),  color:'ms-stg'  },
  { name:'PRD',   date: d(2025,9,26), color:'ms-prd'  },
  { name:'REL',   date: d(2025,10,17),color:'ms-rel'  },
];

// Projects: A = 3 weeks, B = 4 weeks, C = 2 weeks
function addDays(dt, n){ const d=new Date(dt); d.setDate(d.getDate()+n); return d; }

function buildSprints(proj, startDate, weeksPerSprint, count, names, milestoneAssign){
  let sprints=[], cur=new Date(startDate);
  for(let i=0;i<count;i++){
    const end = addDays(cur, weeksPerSprint*7 - 1);
    sprints.push({
      project: proj,
      name: names[i],
      start: new Date(cur),
      end: new Date(end),
      milestone: milestoneAssign[i] || ''
    });
    cur = addDays(end, 1);
  }
  return sprints;
}

const sprintsA = buildSprints('A', d(2025,6,1), 3, 5,
  ['A-SP1 Foundation','A-SP2 Core Build','A-SP3 Integration','A-SP4 Testing','A-SP5 Release Prep'],
  ['DEV','INT','QA','UAT','STG']
);
const sprintsB = buildSprints('B', d(2025,6,1), 4, 4,
  ['B-SP1 Discovery','B-SP2 Backend','B-SP3 Frontend','B-SP4 Hardening'],
  ['DEV','UAT','STG','PRD']
);
const sprintsC = buildSprints('C', d(2025,6,2), 2, 6,
  ['C-SP1 Kickoff','C-SP2 MVP','C-SP3 Alpha','C-SP4 Beta','C-SP5 RC','C-SP6 Launch'],
  ['DEV','INT','QA','UAT','PRD','REL']
);

const allSprints = [...sprintsA, ...sprintsB, ...sprintsC];

// Determine status relative to today
const today = new Date(); today.setHours(0,0,0,0);

function getStatus(s){
  if(s.end < today) return 'completed';
  if(s.start <= today) return 'active';
  return 'planned';
}

// ══════════════════════════════════════════════
//  VIEW SWITCHER
// ══════════════════════════════════════════════
function switchView(v){
  ['calendar','gantt','table'].forEach(id=>{
    const el = document.getElementById('view-'+id);
    el.classList.toggle('active', id===v);
  });
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', ['calendar','gantt','table'][i]===v);
  });
}

// ══════════════════════════════════════════════
//  CALENDAR VIEW
// ══════════════════════════════════════════════
let calYear=2025, calMonth=6; // June 2025

function calNav(dir){
  calMonth += dir;
  if(calMonth>12){calMonth=1; calYear++;}
  if(calMonth<1){calMonth=12; calYear--;}
  renderCalendar();
}

function renderCalendar(){
  const months=['January','February','March','April','May','June',
                 'July','August','September','October','November','December'];
  document.getElementById('cal-title').textContent = months[calMonth-1]+' '+calYear;
  
  const firstDay = new Date(calYear, calMonth-1, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const prevDays = new Date(calYear, calMonth-1, 0).getDate();
  
  const container = document.getElementById('cal-days');
  container.innerHTML='';
  
  const cells = 42;
  for(let i=0;i<cells;i++){
    let day, isOther=false, mo=calMonth, yr=calYear;
    if(i<firstDay){ day=prevDays-firstDay+1+i; isOther=true; mo=calMonth-1; if(mo<1){mo=12;yr--;} }
    else if(i-firstDay >= daysInMonth){ day=i-firstDay-daysInMonth+1; isOther=true; mo=calMonth+1; if(mo>13){mo=1;yr++;} }
    else { day = i-firstDay+1; }
    
    const cellDate = new Date(yr, mo-1, day); cellDate.setHours(0,0,0,0);
    const isToday = cellDate.getTime()===today.getTime();
    
    // Find sprints active on this day
    const active = allSprints.filter(s=>{
      const sd=new Date(s.start); sd.setHours(0,0,0,0);
      const ed=new Date(s.end); ed.setHours(0,0,0,0);
      return cellDate>=sd && cellDate<=ed;
    });
    
    // Find milestones on this day
    const ms = milestones.filter(m=>{
      const md=new Date(m.date); md.setHours(0,0,0,0);
      return cellDate.getTime()===md.getTime();
    });
    
    const div = document.createElement('div');
    div.className='cal-day'+(isOther?' other-month':'')+(isToday?' today':'');
    let html=`<span class="day-num">${day}</span>`;
    
    active.forEach(s=>{
      const cls = s.project==='A'?'pill-a':s.project==='B'?'pill-b':'pill-c';
      html+=`<span class="sprint-pill ${cls}" title="${s.name}">${s.name}</span>`;
    });
    ms.forEach(m=>{
      html+=`<span class="sprint-pill" style="background:rgba(255,153,31,.2);color:var(--milestone);border-left:2px solid var(--milestone)">⬦ ${m.name}</span>`;
    });
    
    div.innerHTML=html;
    container.appendChild(div);
  }
}

renderCalendar();

// ══════════════════════════════════════════════
//  GANTT VIEW
// ══════════════════════════════════════════════
function renderGantt(){
  // Determine date range: June 1 → ~Dec 1
  const ganttStart = d(2025,6,1);
  const ganttEnd   = d(2025,12,1);
  const totalDays  = (ganttEnd - ganttStart) / 86400000;

  function pct(date){
    const days = (date - ganttStart) / 86400000;
    return Math.max(0, Math.min(100, days / totalDays * 100));
  }

  // Summary cards
  const active = allSprints.filter(s=>getStatus(s)==='active').length;
  const planned = allSprints.filter(s=>getStatus(s)==='planned').length;
  const completed = allSprints.filter(s=>getStatus(s)==='completed').length;
  document.getElementById('gantt-summary').innerHTML=`
    <div class="summary-card"><div class="sc-label">Total Sprints</div><div class="sc-val">${allSprints.length}</div><div class="sc-sub">across 3 projects</div></div>
    <div class="summary-card"><div class="sc-label">Active</div><div class="sc-val" style="color:var(--proj-c2)">${active}</div><div class="sc-sub">in progress</div></div>
    <div class="summary-card"><div class="sc-label">Planned</div><div class="sc-val" style="color:var(--proj-a2)">${planned}</div><div class="sc-sub">upcoming</div></div>
    <div class="summary-card"><div class="sc-label">Completed</div><div class="sc-val" style="color:var(--text-dim)">${completed}</div><div class="sc-sub">done</div></div>
    <div class="summary-card"><div class="sc-label">Milestones</div><div class="sc-val" style="color:var(--milestone)">${milestones.length}</div><div class="sc-sub">checkpoints</div></div>
  `;

  // Build month headers
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let monthCols='';
  // Jun through Nov = 6 months
  for(let m=6;m<=11;m++){
    monthCols+=`<div class="gantt-month">${months[m-1]} 2025</div>`;
  }

  // Build day ticks (show every 7th day as label, all as grid)
  let dayTicks='', dayCount=0;
  for(let dt=new Date(ganttStart); dt<ganttEnd; dt=addDays(dt,1)){
    const dow=dt.getDay();
    const isWknd=dow===0||dow===6;
    const isTod=dt.getTime()===today.getTime();
    const lbl = dt.getDate()===1 ? '' : (dt.getDate()%7===1 ? dt.getDate() : '');
    dayTicks+=`<div class="gantt-day-tick${isWknd?' weekend':''}${isTod?' today-tick':''}">${isTod?'T':lbl}</div>`;
    dayCount++;
  }

  // Grid lines for months
  function gridLines(){
    let lines='';
    for(let m=7;m<=11;m++){
      const md=d(2025,m,1);
      lines+=`<div class="gantt-grid-line" style="left:${pct(md)}%"></div>`;
    }
    // Today line
    if(today>=ganttStart && today<ganttEnd){
      lines+=`<div class="gantt-grid-line today-line" style="left:${pct(today)}%"></div>`;
    }
    return lines;
  }

  function msMarkers(){
    let html='';
    milestones.forEach(m=>{
      const ms=d(m.date.getFullYear(), m.date.getMonth()+1, m.date.getDate());
      if(ms<ganttStart||ms>=ganttEnd) return;
      const p=pct(ms);
      html+=`<div class="milestone-marker" style="left:calc(${p}% - 7px)"></div>
             <div class="milestone-label" style="left:calc(${p}% + 5px)">${m.name}</div>`;
    });
    return html;
  }

  function sprintRow(s){
    const startP=pct(s.start), endP=pct(addDays(s.end,1));
    const width=endP-startP;
    const barCls=s.project==='A'?'bar-a':s.project==='B'?'bar-b':'bar-c';
    const status=getStatus(s);
    const fmt=dt=>dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    return `
      <div class="gantt-row">
        <div class="gantt-row-label">
          <div class="row-name">${s.name}</div>
          <div class="row-meta">${fmt(s.start)} – ${fmt(s.end)} · <span style="color:${status==='active'?'var(--proj-c2)':status==='planned'?'var(--proj-a2)':'var(--text-dim)'}">${status}</span></div>
        </div>
        <div class="gantt-bar-area tooltip-wrap">
          ${gridLines()}
          ${msMarkers()}
          <div class="gantt-bar ${barCls}" style="left:${startP}%;width:${width}%">
            ${s.name.length>18?s.name.slice(0,16)+'…':s.name}
          </div>
          <div class="tooltip">
            <strong>${s.name}</strong>
            Start: ${fmt(s.start)}<br>
            End: ${fmt(s.end)}<br>
            Status: ${status}<br>
            Milestone: ${s.milestone||'—'}
          </div>
        </div>
      </div>`;
  }

  let html=`
    <div class="gantt-header-row">
      <div class="gantt-label-col">Sprint</div>
      <div class="gantt-months">${monthCols}</div>
    </div>`;

  [['A',sprintsA,'tag-a'],['B',sprintsB,'tag-b'],['C',sprintsC,'tag-c']].forEach(([proj,sprints,tag])=>{
    html+=`<div class="gantt-section-head"><span class="proj-tag ${tag}">Project ${proj}</span><span style="color:var(--text-dim);font-size:12px">${sprints.length} sprints · ${proj==='A'?'3-week':proj==='B'?'4-week':'2-week'} cadence</span></div>`;
    sprints.forEach(s=>{ html+=sprintRow(s); });
  });

  document.getElementById('gantt-inner').innerHTML=html;
}

renderGantt();

// ══════════════════════════════════════════════
//  TABLE VIEW
// ══════════════════════════════════════════════
let currentFilter='all';

function filterTable(f, btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable(){
  const fmt=dt=>dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  const dur=s=>{ const days=Math.round((s.end-s.start)/86400000)+1; return `${Math.floor(days/7)}w ${days%7}d`; };
  const msBadge=ms=>{
    if(!ms) return '<span style="color:var(--text-dim)">—</span>';
    const m=milestones.find(x=>x.name===ms);
    return m?`<span class="ms-badge ${m.color}">${ms}</span>`:`<span class="ms-badge">${ms}</span>`;
  };
  const statusHtml=s=>{
    const st=getStatus(s);
    const cls=st==='active'?'status-active':st==='planned'?'status-planned':'status-completed';
    return `<span class="status-badge ${cls}"><span class="status-dot"></span>${st.charAt(0).toUpperCase()+st.slice(1)}</span>`;
  };
  const projColor=p=>p==='A'?'proj-a-color':p==='B'?'proj-b-color':'proj-c-color';

  const filtered = allSprints.filter(s=>{
    if(currentFilter==='all') return true;
    if(['A','B','C'].includes(currentFilter)) return s.project===currentFilter;
    return getStatus(s)===currentFilter;
  });

  document.getElementById('table-body').innerHTML = filtered.map(s=>`
    <tr>
      <td><span class="proj-label ${projColor(s.project)}">Project ${s.project}</span></td>
      <td><span class="sprint-name">${s.name}</span></td>
      <td>${statusHtml(s)}</td>
      <td class="date-cell">${fmt(s.start)}</td>
      <td class="date-cell">${fmt(s.end)}</td>
      <td class="date-cell">${dur(s)}</td>
      <td>${msBadge(s.milestone)}</td>
    </tr>
  `).join('');
}

renderTable();
</script>
